name = "kayakpolosignups"
account_id = "7b24a491f5dc20008fd759bb3a5b0636"
main = "worker.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Hourly reconciliation: catch anything the email pipeline missed
[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "D1_DB"
database_name = "kayakpolo"
database_id = "b2a2e2bf-5b93-4c52-b2b3-94b15587addd"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
